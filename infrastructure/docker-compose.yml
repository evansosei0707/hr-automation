# HR Automation — local & production stack
# Pin versions explicitly; no `:latest` in production deployments.

name: hr-automation

networks:
  internal:
    driver: bridge

volumes:
  twenty_db_data:
  twenty_server_data:
  bookings_db_data:
  redis_data:
  n8n_data:
  nginx_certs:

services:

  # ─────────────────────────────────────────────
  # Twenty CRM — the system of record
  # ─────────────────────────────────────────────
  twenty-db:
    image: postgres:16
    container_name: hr-twenty-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TWENTY_DB_USER}
      POSTGRES_PASSWORD: ${TWENTY_DB_PASSWORD}
      POSTGRES_DB: ${TWENTY_DB_NAME}
    volumes:
      - twenty_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TWENTY_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  twenty:
    image: twentycrm/twenty:v2.1.0
    container_name: hr-twenty
    restart: unless-stopped
    depends_on:
      twenty-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${TWENTY_DB_USER}:${TWENTY_DB_PASSWORD}@twenty-db:5432/${TWENTY_DB_NAME}
      SERVER_URL: ${TWENTY_SERVER_URL}
      FRONT_AUTH_CALLBACK_URL: ${TWENTY_SERVER_URL}/auth/callback
      APP_SECRET: ${TWENTY_APP_SECRET}
      STORAGE_TYPE: local
      REDIS_URL: redis://redis:6379
    volumes:
      - twenty_server_data:/app/packages/twenty-server/.local-storage
    networks:
      - internal
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ─────────────────────────────────────────────
  # Twenty worker — background jobs (BullMQ on Redis)
  # ─────────────────────────────────────────────
  twenty-worker:
    image: twentycrm/twenty:v2.1.0
    container_name: hr-twenty-worker
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    depends_on:
      twenty:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PG_DATABASE_URL: postgres://${TWENTY_DB_USER}:${TWENTY_DB_PASSWORD}@twenty-db:5432/${TWENTY_DB_NAME}
      SERVER_URL: ${TWENTY_SERVER_URL}
      APP_SECRET: ${TWENTY_APP_SECRET}
      STORAGE_TYPE: local
      REDIS_URL: redis://redis:6379
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
    volumes:
      - twenty_server_data:/app/packages/twenty-server/.local-storage
    networks:
      - internal

  # ─────────────────────────────────────────────
  # Bookings DB — n8n-owned, for slots and locks
  # ─────────────────────────────────────────────
  bookings-db:
    image: postgres:16
    container_name: hr-bookings-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${BOOKINGS_DB_USER}
      POSTGRES_PASSWORD: ${BOOKINGS_DB_PASSWORD}
      POSTGRES_DB: ${BOOKINGS_DB_NAME}
      N8N_DB_USER: ${N8N_DB_USER}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_DB_NAME: ${N8N_DB_NAME}
    volumes:
      - bookings_db_data:/var/lib/postgresql/data
      - ./postgres/init-bookings-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./postgres/init-n8n-user.sh:/docker-entrypoint-initdb.d/02-n8n-user.sh:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOOKINGS_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis — locks, dedupe keys
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", "", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # n8n — all workflow orchestration
  # ─────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:2.18.5
    container_name: hr-n8n
    restart: unless-stopped
    depends_on:
      bookings-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      GENERIC_TIMEZONE: Africa/Accra
      TZ: Africa/Accra
      N8N_LOG_LEVEL: info

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: bookings-db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET}

      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "336"   # 14 days in hours

      N8N_RUNNERS_ENABLED: "true"

      # n8n 2.x blocks $env.* access in expressions by default. Set to "false"
      # to restore 1.x behaviour. Required because all workflows read API keys
      # via $env.ANTHROPIC_API_KEY, $env.WHATSAPP_TOKEN, etc.
      # See .claude/rules/n8n-workflows.md rule #17.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      TWENTY_API_URL: http://twenty:3000
      TWENTY_API_KEY: ${TWENTY_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_TOKEN}
      CALIBRATION_WINDOW_ACTIVE: "false"

      # Allowlist Node.js stdlib modules accessible to Code nodes via require().
      # Default n8n sandbox blocks ALL require() of stdlib. We need crypto for
      # HMAC validation in webhook handlers (Workflow A). Add comma-separated
      # modules here as more workflows need them. Use '*' to permit all
      # (broader attack surface — only if a workflow genuinely needs unrestricted
      # access). See .claude/rules/n8n-workflows.md rule #12.
      NODE_FUNCTION_ALLOW_BUILTIN: "crypto"

      # WhatsApp Cloud API integration (Workflow A and beyond).
      # Full cluster propagated now to avoid recycling the n8n container twice
      # (once for verify/HMAC handlers, again later for outbound send).
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - internal
    ports:
      - "127.0.0.1:5678:5678"

  # ─────────────────────────────────────────────
  # Nginx — TLS termination, reverse proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: hr-nginx
    restart: unless-stopped
    depends_on:
      - twenty
      - n8n
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/letsencrypt
    networks:
      - internal

  # ─────────────────────────────────────────────
  # Bookings DB migration runner (one-shot)
  # Runs on `up`, applies any new migrations, exits.
  # ─────────────────────────────────────────────
  migrate-bookings:
    image: postgres:16
    container_name: hr-migrate-bookings
    depends_on:
      bookings-db:
        condition: service_healthy
    volumes:
      - ../database/migrations:/migrations:ro
      - ../scripts/run-migrations.sh:/run-migrations.sh:ro
    environment:
      PGHOST: bookings-db
      PGUSER: ${BOOKINGS_DB_USER}
      PGPASSWORD: ${BOOKINGS_DB_PASSWORD}
      PGDATABASE: ${BOOKINGS_DB_NAME}
    networks:
      - internal
    command: ["/run-migrations.sh"]
    restart: "no"
