worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Forwarded proto so Twenty and n8n generate correct URLs
    map $http_x_forwarded_proto $fwd_proto {
        default $scheme;
        ~.+     $http_x_forwarded_proto;
    }

    # =============================================
    # Twenty CRM
    # =============================================
    server {
        listen 80;
        server_name crm.localhost;

        # In production, redirect 80 -> 443 and terminate TLS here with LE certs.
        # For local dev, plain HTTP is fine.

        location / {
            proxy_pass http://twenty:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_read_timeout 300s;
            client_max_body_size 25m;
        }
    }

    # =============================================
    # n8n (UI + webhooks)
    # =============================================
    server {
        listen 80;
        server_name n8n.localhost;

        location / {
            proxy_pass http://n8n:5678;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_read_timeout 300s;
            client_max_body_size 25m;
        }

        location /webhook/ {
            proxy_pass http://n8n:5678/webhook/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_read_timeout 30s;
            client_max_body_size 25m;
        }
    }
}
